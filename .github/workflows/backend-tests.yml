name: Backend Tests

on:
  push:
    branches: ["main"]
    paths:
      - "server/**"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "server/**"
      - ".github/workflows/backend-tests.yml"

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server/backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies (FFmpeg)
        # Required by tests/test_ffmpeg_utils.py, which exercises the
        # production audio-processing pipeline against the real ffmpeg
        # binary (resampling, normalization, format conversion).
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies (whisper extra + dev group)
        run: uv sync --extra whisper --group dev

      # Story 1.1 AC4 — banned-API gate must run BEFORE pytest so a
      # violation fails the build cheaply (lint is seconds; pytest is minutes).
      - name: Lint (ruff banned-api gate)
        run: uv run ruff check tests/

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short
