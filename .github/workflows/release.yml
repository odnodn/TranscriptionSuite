name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag name to release (e.g. v1.2.3). Required when triggering manually."
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.22.3"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build and package AppImage
        run: npm run package:linux

      - name: Import GPG key
        if: ${{ vars.GPG_SIGNING_ENABLED == 'true' }}
        run: echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
        working-directory: .

      - name: Sign artifacts
        if: ${{ vars.GPG_SIGNING_ENABLED == 'true' }}
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: bash ../build/sign-electron-artifacts.sh release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: |
            dashboard/release/*.AppImage
            dashboard/release/*.yml
            dashboard/release/*.asc
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.22.3"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build and package NSIS installer
        shell: pwsh
        run: |
          $maxRetries = 3
          for ($i = 1; $i -le $maxRetries; $i++) {
            Write-Host "Attempt $i of $maxRetries"
            npm run package:windows
            if ($LASTEXITCODE -eq 0) { break }
            if ($i -lt $maxRetries) {
              Write-Host "Build failed, retrying in 15 seconds..."
              Start-Sleep -Seconds 15
            } else {
              Write-Host "All $maxRetries attempts failed"
              exit 1
            }
          }

      - name: Import GPG key
        if: ${{ vars.GPG_SIGNING_ENABLED == 'true' }}
        shell: bash
        run: echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Sign artifacts
        if: ${{ vars.GPG_SIGNING_ENABLED == 'true' }}
        shell: bash
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: bash ../build/sign-electron-artifacts.sh release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            dashboard/release/*.exe
            dashboard/release/*.yml
            dashboard/release/*.asc
          if-no-files-found: error

  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.22.3"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Setup Python (for dmgbuild)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build macOS DMG (thin)
        env:
          GPG_KEY_ID: ""
        run: bash build/build-electron-mac.sh

      - name: Import GPG key
        if: ${{ vars.GPG_SIGNING_ENABLED == 'true' }}
        run: echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Sign artifacts
        if: ${{ vars.GPG_SIGNING_ENABLED == 'true' }}
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: bash build/sign-electron-artifacts.sh dashboard/release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: |
            dashboard/release/*.dmg
            dashboard/release/*.yml
            dashboard/release/*.asc
          if-no-files-found: error

  build-macos-metal:
    runs-on: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.22.3"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install npm dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build renderer and main process
        working-directory: dashboard
        run: npm run build:electron

      - name: Package Electron app bundle (arm64 dir)
        working-directory: dashboard
        run: npx electron-builder --mac dir --arm64

      - name: Create server package symlink for hatchling
        run: ln -sf . server/backend/server

      - name: Install Python/MLX backend into app bundle
        run: |
          APP_BUNDLE="$(pwd)/dashboard/release/mac-arm64/TranscriptionSuite.app"
          VENV_DIR="$APP_BUNDLE/Contents/Resources/backend/.venv"
          PYTHON_DEST="$APP_BUNDLE/Contents/Resources/python"

          # Download uv-managed CPython 3.13 and copy its entire installation
          # directory into the app bundle.  The python-build-standalone distribution
          # is relocatable (uses @executable_path RPATHs), so the copy is fully
          # self-contained — users need no Python pre-installed on their Mac.
          uv python install 3.13
          PYTHON_BIN="$(uv python find 3.13)"
          # macOS readlink lacks -f; delegate realpath resolution to Python.
          PYTHON_REAL="$(python3 -c "import os; print(os.path.realpath('$PYTHON_BIN'))")"
          PYTHON_VER="$(basename "$PYTHON_REAL")"  # e.g. python3.13
          PYTHON_ROOT="$(python3 -c "import os; print(os.path.dirname(os.path.dirname('$PYTHON_REAL')))") "
          PYTHON_ROOT="${PYTHON_ROOT%% }"  # trim trailing space from subshell
          echo "→ Bundling CPython ($PYTHON_VER) from $PYTHON_ROOT"
          cp -a "$PYTHON_ROOT" "$PYTHON_DEST"

          # Create the venv using the bundled Python. The absolute path is valid
          # at CI time; relative symlinks are created below to survive relocation.
          mkdir -p "$(dirname "$VENV_DIR")"
          uv venv "$VENV_DIR" --python "$PYTHON_DEST/bin/$PYTHON_VER"
          UV_PROJECT_ENVIRONMENT="$VENV_DIR" uv sync \
            --directory server/backend \
            --extra mlx \
            --no-editable

          # The venv's python symlinks now embed the CI runner's absolute path
          # (e.g. /Users/runner/.local/share/uv/python/.../bin/python3.13).
          # That path doesn't exist on the user's machine, so fs.existsSync(
          # '.venv/bin/python3') returns false for a dangling symlink, causing
          # mlxServerManager to fall back to the uvicorn console script (which
          # has the same broken absolute shebang) and fail with exit code 126.
          #
          # Fix: re-create the symlinks as relative paths within the bundle:
          #   .venv/bin/ is at: Resources/backend/.venv/bin/
          #   python/bin/ is at: Resources/python/bin/
          #   Relative: ../../../python/bin/$PYTHON_VER
          REL="../../../python/bin/$PYTHON_VER"
          for name in python python3 "$PYTHON_VER"; do
            [ -e "$VENV_DIR/bin/$name" ] || [ -L "$VENV_DIR/bin/$name" ] || continue
            ln -sf "$REL" "$VENV_DIR/bin/$name"
          done

          echo "App bundle size after backend install: $(du -sh "$APP_BUNDLE" | cut -f1)"

      - name: Re-sign app bundle after backend injection
        # electron-builder builds with hardenedRuntime=true, signing the Electron
        # binaries.  Adding the Python venv (with many unsigned .so files) breaks
        # that signature, causing Gatekeeper to report "damaged and can't be opened".
        # Re-sign everything with an ad-hoc identity (-) so the bundle signature is
        # internally consistent.
        # NOTE: Even with correct ad-hoc signing, macOS Gatekeeper will block
        # quarantined downloads. After installing, users must run:
        #   xattr -dr com.apple.quarantine /Applications/TranscriptionSuite.app
        run: |
          APP="$(pwd)/dashboard/release/mac-arm64/TranscriptionSuite.app"
          # Clear any extended attributes on the bundle that could interfere.
          xattr -cr "$APP"
          # Sign all Mach-O files in Resources — covers both the Python venv
          # extension modules (.so/.dylib) and the bundled CPython interpreter
          # and its own dylibs.  --deep doesn't reach plain files in Resources,
          # only nested .app/.framework bundles, so we sign them explicitly first.
          # Pass -perm /111 to also catch the python3.13 executable itself.
          find "$APP/Contents/Resources" -type f \( -name "*.so" -o -name "*.dylib" \) \
            -print0 | xargs -0 -P4 codesign --force --sign - 2>/dev/null || true
          find "$APP/Contents/Resources" -type f -perm /111 \
            -print0 | xargs -0 -P4 codesign --force --sign - 2>/dev/null || true
          # Deep-sign the whole bundle. --deep processes nested frameworks and apps
          # bottom-up, so the Electron Framework (and its constituent dylibs that
          # were modified by the individual signing above) gets a fresh consistent
          # signature before the outer .app is sealed.
          codesign --force --deep --sign - "$APP"

      - name: Verify bundled MLX venv
        # Fail the release if the injected venv is missing uvicorn, or if the bundled
        # Python (reached through the relocated RELATIVE symlink) cannot import it.
        # This converts a silently-broken Metal bundle into a hard build failure
        # instead of a "Cannot find uvicorn binary" popup on the user's Mac (GH #124).
        run: |
          APP_BUNDLE="$(pwd)/dashboard/release/mac-arm64/TranscriptionSuite.app"
          VENV_DIR="$APP_BUNDLE/Contents/Resources/backend/.venv"
          # 0. Guard the hard-coded electron-builder output path — without this, a
          #    moved build dir surfaces as a misleading "missing uvicorn" error.
          if [ ! -d "$APP_BUNDLE" ]; then
            echo "::error::App bundle not found at $APP_BUNDLE — check electron-builder output directory"
            exit 1
          fi
          # 1. The presence probe that mlxServerManager._uvicornCandidates() relies on.
          if [ ! -e "$VENV_DIR/bin/uvicorn" ]; then
            echo "::error::Bundled MLX venv is missing bin/uvicorn ($VENV_DIR/bin/uvicorn)"
            exit 1
          fi
          # 2. The real runtime invocation (`python -m uvicorn`): the bundled python
          #    reached via the relative symlink must import uvicorn AND fastapi — this
          #    validates relocation + pyvenv.cfg/site-packages resolution and that the
          #    web-framework deps actually installed, not just file presence. (fastapi
          #    is lightweight; the server module is intentionally not imported here to
          #    avoid pulling heavy MLX/torch deps into the CI gate.)
          if ! "$VENV_DIR/bin/python3" -c "import uvicorn, fastapi; print('uvicorn', uvicorn.__version__)"; then
            echo "::error::Bundled python cannot import uvicorn/fastapi — broken venv or relocated symlink"
            exit 1
          fi
          echo "✓ Bundled MLX venv verified (uvicorn + fastapi present and importable)"

      - name: Create DMG from app bundle
        run: |
          # Read version from dashboard/package.json so the bundled Metal DMG
          # filename matches the thin DMG's versioned naming pattern
          # (thin: TranscriptionSuite-<ver>-arm64-mac.dmg /
          #        TranscriptionSuite-<ver>-x64-mac.dmg
          #  bundled: TranscriptionSuite-<ver>-arm64-mac-metal.dmg).
          VERSION="$(node -p "require('./dashboard/package.json').version")"
          mkdir -p dmg-staging
          cp -a dashboard/release/mac-arm64/TranscriptionSuite.app dmg-staging/
          ln -sf /Applications dmg-staging/Applications
          cp build/macos-metal-install-instructions.txt \
            "dmg-staging/Installation Instructions.txt"
          hdiutil create \
            -volname "TranscriptionSuite" \
            -srcfolder dmg-staging \
            -ov -format UDZO \
            -o "dashboard/release/TranscriptionSuite-${VERSION}-arm64-mac-metal.dmg"
          rm -rf dmg-staging

      - name: Import GPG key
        if: ${{ vars.GPG_SIGNING_ENABLED == 'true' }}
        run: echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Sign artifacts
        if: ${{ vars.GPG_SIGNING_ENABLED == 'true' }}
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: bash build/sign-electron-artifacts.sh dashboard/release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-metal
          path: |
            dashboard/release/TranscriptionSuite-*-arm64-mac-metal.dmg
            dashboard/release/*.asc
          if-no-files-found: error

  create-release:
    needs: [build-linux, build-windows, build-macos, build-macos-metal]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List release files
        run: ls -lh release-artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          generate_release_notes: true
          draft: true
          files: release-artifacts/*
