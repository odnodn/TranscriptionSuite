# ============================================================================
# TranscriptionSuite - Unified Configuration
# ============================================================================
# This is the central configuration file for the entire TranscriptionSuite.

# ----------------------------------------------------------------------------
# Longform Recording
# ----------------------------------------------------------------------------
# Settings for live recording mode (start/stop dictation).
longform_recording:
    # Language code for transcription (e.g., "en" for English, "el" for Greek).
    # Set to null for automatic language detection.
    # This setting applies to both the main and live transcribers.
    language: null

    # Enable translation for main transcription flows (longform/static/notebook).
    # v1 supports source-language -> English only.
    translation_enabled: false

    # Translation output target language. Faster-whisper only offers English translation.
    translation_target_language: "en"

    # Automatically add longform recordings to Audio Notebook.
    # When enabled, recordings are sent to the notebook instead of just the clipboard.
    auto_add_to_audio_notebook: false

# ----------------------------------------------------------------------------
# Static File Transcription
# ----------------------------------------------------------------------------
# Settings for transcribing audio/video files (not live recording).
# These settings are used as defaults for standalone client file transcriptions.
static_transcription:
    # Maximum characters per segment in the output (when longer we create a new line)
    # Segments are split when speaker changes or this limit is reached.
    max_segment_chars: 500

    # Silero VAD preprocessing removes silence before transcription.
    # Stage 1 of two-stage VAD (Stage 2 is faster_whisper_vad_filter).
    # Silero VAD is used for static transcription to maintain timestamp consistency.
    silero_vad_preprocessing: true

    # Silero VAD sensitivity (0.0-1.0, higher = more sensitive to speech).
    # 0.5 is a good default balance between removing silence and keeping speech.
    silero_vad_sensitivity: 0.5

# ----------------------------------------------------------------------------
# Main Transcriber Configuration
# ----------------------------------------------------------------------------
# The high-accuracy transcriber used for final transcription.
main_transcriber:
    # Model from HuggingFace to use for transcription.
    # Whisper examples: "Systran/faster-whisper-large-v3", "Systran/faster-whisper-medium"
    # Parakeet examples: "nvidia/parakeet-tdt-0.6b-v3" (25 European languages, requires INSTALL_NEMO=true)
    # VibeVoice-ASR examples: "microsoft/VibeVoice-ASR", "scerz/VibeVoice-ASR-4bit" (experimental, file/notebook only)
    # Backend is auto-detected from the model name (nvidia/* → NeMo, */VibeVoice-ASR* → VibeVoice-ASR, else → Whisper).
    model: "nvidia/parakeet-tdt-0.6b-v3"

    # Compute type for the model. "default" is recommended.
    # Options: "default", "auto", "int8", "int8_float16", "int16", "float16", "float32"
    compute_type: "default"

    # Hardware device: "cuda" for NVIDIA GPUs, "cpu" for CPU.
    device: "cuda"

    # GPU device index if you have multiple GPUs. Usually 0.
    gpu_device_index: 0

    # Transcription engine batch size. Higher may be faster on powerful GPUs.
    batch_size: 16

    # Beam size for decoding. Higher can improve accuracy but is slower.
    beam_size: 5

    # Optional initial prompt to guide transcription style/context.
    # Example: "This is a technical transcript. ZFS, Kubernetes, TCP/IP."
    initial_prompt: null

    # Use faster-whisper's built-in VAD to filter silence.
    faster_whisper_vad_filter: true

    # Extra decode / anti-hallucination options for Whisper-family backends
    # (faster-whisper, WhisperX, Whisper).  These are passed directly to
    # WhisperModel.transcribe() as keyword arguments.  Keys not recognised
    # by the installed library version are silently ignored.
    # NeMo and VibeVoice backends ignore this section entirely.
    #
    # Commonly tuned hallucination-related options:
    #   no_speech_threshold: 0.6         # Segments below this are marked as no-speech
    #   compression_ratio_threshold: 2.4 # Segments above this ratio are treated as failed
    #   log_prob_threshold: -1.0         # Segments below this average log-prob are treated as failed
    #   condition_on_previous_text: true  # Condition on previous output (set false to reduce loops)
    #   hallucination_silence_threshold: null  # Skip silent gaps longer than this (seconds)
    #   repetition_penalty: 1.0          # Penalise repeated tokens (>1.0 discourages repetition)
    #   prompt_reset_on_temperature: 0.5 # Reset initial_prompt when temperature exceeds this
    # Example:
    #   whisper_decode:
    #     no_speech_threshold: 0.6
    #     compression_ratio_threshold: 2.4
    whisper_decode: {}

    # Prevent the library from creating its own log file.
    no_log_file: true

# ----------------------------------------------------------------------------
# NeMo Parakeet Backend Settings
# ----------------------------------------------------------------------------
parakeet:
    # Maximum chunk duration (seconds) for long audio. Audio longer than this
    # is split into sequential chunks. Default: 300 (5 minutes).
    max_chunk_duration_s: 300

    # Enable local attention for long sequences. Caps attention memory at O(N)
    # instead of O(N^2). Required for audio >5 min on GPUs with <16GB VRAM.
    use_local_attention: true
    local_attention_window: [128, 128]

    # Chunk the subsampling convolution to reduce peak memory.
    subsampling_conv_chunking: true

    # --- MLX Parakeet Backend Settings (Apple Silicon only) ---
    # These apply when using parakeet-mlx on Apple Silicon via Metal.

    # Enable local attention for audio longer than mlx_local_attention_threshold_s.
    # Short audio uses full attention for maximum accuracy; long audio uses local
    # attention to cap memory at O(N) instead of O(N²).
    # Default: true
    mlx_local_attention: true

    # Local attention context window [left, right] in frames.
    # (256, 256) recommended balance of accuracy and memory.
    # (128, 128) for tighter memory constraints.
    # Default: [256, 256]
    mlx_local_attention_window: [256, 256]

    # Audio duration threshold (seconds) above which local attention is used.
    # Files shorter than this use full attention for best quality.
    # Default: 120 (2 minutes)
    mlx_local_attention_threshold_s: 120

    # Chunk duration (seconds) for MLX Parakeet long audio processing.
    # Audio longer than this is split into overlapping chunks.
    # Set to 0 to disable chunking (process entire file at once).
    # Default: 120
    mlx_chunk_duration_s: 120

    # Overlap duration (seconds) between chunks for accurate merging.
    # Default: 15
    mlx_overlap_duration_s: 15

# ----------------------------------------------------------------------------
# Sortformer Diarization Settings (Apple Silicon only)
# ----------------------------------------------------------------------------
# Settings for the MLX Sortformer speaker diarization engine.
# Used automatically on Apple Silicon when diarization is requested.
sortformer:
    # Streaming chunk duration (seconds) for Sortformer diarization.
    # Smaller chunks use dramatically less memory (quadratic attention scaling).
    # The streaming state carries speaker context across chunks.
    # Recommended: 5-10s. Maximum trained: 90s.
    # Set to 0 to disable streaming and use offline mode (higher memory).
    # Default: 5.0
    chunk_duration_s: 5.0

# ----------------------------------------------------------------------------
# MLX Memory Settings (Apple Silicon only)
# ----------------------------------------------------------------------------
# Controls Metal GPU buffer pool management for all MLX backends.
mlx:
    # Metal buffer cache limit in MB. Bounds how large the GPU memory pool can
    # grow during inference. Intermediate allocations are reused from this pool.
    # Set to 0 to disable (unlimited pool growth — not recommended).
    # Default: 1024 (1 GB)
    metal_cache_limit_mb: 1024

# ----------------------------------------------------------------------------
# VibeVoice-ASR (Experimental, In-Process Backend)
# ----------------------------------------------------------------------------
vibevoice_asr:
    # Preferred input sample rate for VibeVoice-ASR inputs.
    # Session /ws recording can capture at this rate directly; file uploads are
    # resampled to this rate during backend-aware audio loading when needed.
    target_sample_rate_hz: 24000

    # Upstream docs currently use Qwen 2.5 7B as the language model companion.
    language_model_pretrained_name: "Qwen/Qwen2.5-7B"

    # Generation settings.
    attn_implementation: "eager"
    # VibeVoice structured JSON output is sensitive to generation settings.
    # Use VibeVoice-specific defaults (aligned with upstream demo) instead of
    # inheriting the global main_transcriber.beam_size.
    num_beams: 1
    temperature: 0.0
    # Explicitly cap generation to reduce malformed/truncated structured JSON.
    # Set 0 (or null) only if you intentionally want to omit max_new_tokens.
    max_new_tokens: 32768
    # Maximum chunk duration (seconds) for long audio. Audio longer than this is
    # split into chunks to avoid CUDA OOM. Default: 60 (1 minute).
    max_chunk_duration_s: 60

# ----------------------------------------------------------------------------
# Live Mode (RealtimeSTT) Configuration
# ----------------------------------------------------------------------------
# Settings used by Live Mode preview in the native client.
# Live Mode runs continuously over /ws/live when enabled from the dashboard.
live_transcriber:
    # Enable/disable Live Mode preview in the dashboard client.
    enabled: false

    # Language for Live Mode (e.g., "en", "el").
    # Modified via the dashboard Client view dropdown (Live Mode Language).
    # Default: "en"
    live_language: "en"

    # Enable translation in Live Mode sentence output.
    # v1 supports source-language -> English only.
    translation_enabled: false

    # Translation output target language. Faster-whisper only offers English translation.
    translation_target_language: "en"

    # Model for live transcription. Defaults to main_transcriber.model if not set.
    # Using the same model as main_transcriber is recommended for consistency.
    # Live Mode v1 supports only faster-whisper/Whisper backend models.
    model: "Systran/faster-whisper-medium"
    compute_type: "default"
    device: "cuda"
    gpu_device_index: 0
    batch_size: 16
    beam_size: 5

    # VAD settings for quick sentence-by-sentence transcription.
    silero_sensitivity: 0.4
    silero_use_onnx: false
    # Grace period after silence detection before stopping recording
    # Allows user to pause for up to 3 seconds while speaking
    post_speech_silence_duration: 3.0
    min_length_of_recording: 1.0

    # Trigger early transcription during silence (seconds, 0 = disabled)
    early_transcription_on_silence: 0.5

    no_log_file: true

# ----------------------------------------------------------------------------
# Speaker Diarization (PyAnnote)
# ----------------------------------------------------------------------------
# Settings for the speaker diarization module.
# Requires a HuggingFace token with access to PyAnnote models.
diarization:
    # PyAnnote model for speaker diarization.
    # Default: "pyannote/speaker-diarization-community-1"
    model: "pyannote/speaker-diarization-community-1"

    # HuggingFace token for accessing PyAnnote models.
    # You must accept the model license on HuggingFace first.
    #
    # IMPORTANT: Do NOT put your token here! This file is baked into
    # the Docker image. Instead, set HUGGINGFACE_TOKEN in server/docker/.env
    # or pass it as an environment variable.
    #
    # The token is resolved in this order:
    #   1. HF_TOKEN environment variable (from server/docker/.env)
    #   2. This config value (not recommended for Docker deployments)
    hf_token: null

    # Device for diarization.
    # "auto"  - best available: CUDA → MPS (Apple Silicon) → CPU  (recommended)
    # "cuda"  - NVIDIA GPU (falls back to MPS then CPU if unavailable)
    # "mps"   - Apple Silicon GPU (falls back to CPU if unavailable)
    # "cpu"   - force CPU
    # Default: "auto"
    device: "auto"

    # Speaker count hints (null for auto-detection).
    # If you know exactly how many speakers, set both to the same value.
    # Default: null (auto-detect)
    min_speakers: null
    max_speakers: null

    # Minimum speech segment duration (seconds).
    # Segments shorter than this are discarded.
    # Default: 0.0
    min_duration_on: 0.0

    # Minimum silence duration (seconds) between speech segments.
    # Shorter silences within a speaker's turn are ignored.
    # Default: 0.0
    min_duration_off: 0.0

    # Merge segments from same speaker if gap is less than this (seconds).
    # Helps create cleaner segment boundaries.
    # Default: 0.5
    merge_gap_threshold: 0.5

    # Batch size for speaker embeddings extraction. Lower values use less GPU
    # memory. Set to 1 for minimum memory on GPUs with <16GB VRAM.
    # Default: 32
    embedding_batch_size: 32

    # Run transcription and diarization concurrently (true) or sequentially (false).
    # Parallel is faster but uses more GPU memory. Set to false on GPUs with <16GB VRAM.
    # Default: false (safer for most hardware)
    # Note that when this is set to (false) we also unload the main model during diarization.
    parallel: false

# ----------------------------------------------------------------------------
# Audio Settings
# ----------------------------------------------------------------------------
audio:
    # Audio input device index for microphone.
    # Run `transcription-dashboard --list-devices` to find available devices.
    # Set to null if using use_default_input: true
    input_device_index: null

    # If true, automatically use the default system microphone.
    # If false, use the device specified by input_device_index.
    use_default_input: true

# ----------------------------------------------------------------------------
# Audio Processing Backend
# ----------------------------------------------------------------------------
# Configuration for the audio processing engine.
# FFmpeg provides professional-grade quality and performance for file operations.
# For real-time WebSocket streaming, scipy is retained for low-latency performance.
audio_processing:
    # Audio processing backend for file-based operations:
    #   - "ffmpeg": Professional-grade filters (recommended)
    #     * 30-40% faster file loading (single-pass)
    #     * High-quality SoX resampler
    #     * Professional normalization (dynaudnorm/loudnorm)
    #     * Handles all formats without temp WAV files
    #   - "legacy": scipy/soundfile (for compatibility)
    #     * Two-pass operation (load + resample)
    #     * Simple peak normalization
    # Default: "ffmpeg"
    backend: "ffmpeg"

    # FFmpeg resampling algorithm (used when backend="ffmpeg"):
    #   - "soxr": SoX resampler - highest quality, professional-grade
    #     * 28-bit intermediate precision
    #     * Sinc interpolation
    #     * Slightly slower but best audio quality
    #   - "swr_linear": Linear interpolation - fast, good quality
    #     * Faster than soxr
    #     * Good for most use cases
    # Default: "soxr"
    resampler: "soxr"

    # Audio normalization method (used when backend="ffmpeg"):
    #   - "dynaudnorm": Dynamic range normalization (recommended for speech)
    #     * Adapts to volume changes over time
    #     * 500ms analysis window
    #     * Target RMS 0.25 (prevents clipping)
    #     * Best for varied speech levels
    #   - "loudnorm": EBU R128 loudness standard (broadcasting quality)
    #     * Integrated loudness: -16 LUFS
    #     * True peak limit: -1.5 dBFS
    #     * Loudness range: 11 LU
    #     * Professional broadcasting standard
    #   - "peak": Simple peak normalization to -3.0 dB (legacy behavior)
    #     * Fast, simple algorithm
    #     * Compatible with legacy backend
    # Default: "dynaudnorm"
    normalization_method: "dynaudnorm"

# ----------------------------------------------------------------------------
# Storage Settings
# ----------------------------------------------------------------------------
# Configuration for where the viewer app stores files.
# These paths are Docker container paths by default.
# For local development, override via your own config.yaml.
storage:
    # Directory for storing audio files.
    audio_dir: "/data/audio"

    # Directory for the SQLite database.
    database_dir: "/data/database"

    # Audio storage format for imported files.
    # Source files are converted to MP3 for efficient storage.
    audio_format: "mp3"

    # MP3 encoding quality (bitrate in kbps).
    # 128 = good quality, reasonable size
    # 192 = high quality
    # 64  = smaller files, lower quality
    audio_bitrate: 160

# ----------------------------------------------------------------------------
# Database Backup Configuration
# ----------------------------------------------------------------------------
# Automatic backup settings for the SQLite database.
# Backups are created at server startup if the latest backup is too old.
# Backups use SQLite's built-in backup API which is safe with WAL mode.
backup:
    # Enable/disable automatic backups
    enabled: true

    # Maximum age of the latest backup (hours) before a new backup is triggered.
    # Set to 1 to backup at most once per hour.
    # Default: 1
    max_age_hours: 1

    # Maximum number of backup files to keep.
    # Older backups are automatically deleted.
    # Default: 3
    max_backups: 3

    # Note: Backups are stored in /data/database/backups/ (Docker)
    # or <data_dir>/database/backups/ (local development)

# ----------------------------------------------------------------------------
# Processing Settings
# ----------------------------------------------------------------------------
processing:
    # Temporary directory for intermediate files during transcription.
    temp_dir: "/tmp/transcriptionsuite"

    # Whether to keep temporary WAV files after processing.
    keep_temp_files: false

    # Sample rate for audio processing (Whisper requires 16kHz).
    sample_rate: 16000

# ----------------------------------------------------------------------------
# LLM Integration (OpenAI-compatible endpoint)
# ----------------------------------------------------------------------------
# Works with any OpenAI-compatible API: LM Studio, Ollama, OpenAI, Groq,
# OpenRouter, and others. Set base_url to the provider's endpoint and
# api_key if required.
local_llm:
    # Enable/disable LLM features in the viewer app
    enabled: true

    # OpenAI-compatible API endpoint URL
    base_url: "http://127.0.0.1:1234"

    # API key for authenticated providers (leave empty for local servers)
    api_key: ""

    # Model ID to use (e.g. "gpt-4o", "llama-3.1-8b-instruct").
    # If empty, auto-detected from the provider's loaded models.
    # model: ""

    # Prompt used to auto-generate a conversation title after the first reply.
    # The LLM receives the first few messages and this prompt, and must respond
    # with a plain title of 8 words or fewer.
    title_generation_prompt: |
      Your task is to produce a SHORT TITLE for this conversation.
      Rules:
      - Maximum 8 words
      - Use the primary language of the conversation
      - Output ONLY the title — no preamble, no explanation, no quotes, no punctuation at the end
      Examples of good titles:
        Copper grain boundary discussion
        Project deadline planning
        Python async debugging session
        Marketing campaign brainstorm
      Bad (do not do this): "Sure, here is a title: Grain boundaries in copper alloys."

    # Whether to automatically generate a title after the first exchange.
    auto_title_enabled: true

    # Default system prompt for summarization
    default_system_prompt: |
        You are a helpful assistant that analyzes transcriptions.
        When given a transcription, provide a clear and concise summary
        highlighting the main points, key topics discussed, and any
        action items if applicable. Respond in the same language as
        the transcription.

# ----------------------------------------------------------------------------
# Remote Transcription Server
# ----------------------------------------------------------------------------
# Settings for the web-based remote transcription server.
# This allows clients on other devices to transcribe audio via a web browser
# interface (for example Tailscale or a trusted local network).
# These paths are Docker container paths by default.
remote_server:
    # Enable the remote server mode
    enabled: true

    # Network interface to bind to.
    # Use "0.0.0.0" to accept connections from any interface.
    # Use "127.0.0.1" for local-only connections.
    host: "0.0.0.0"

    # Path to token storage file
    token_store: "/data/tokens/tokens.json"

    # TLS/SSL configuration
    # Certificates are mounted from host when TLS_ENABLED=true
    tls:
        enabled: false # Controlled via TLS_ENABLED env var in Docker
        cert_file: "/certs/cert.crt" # Container path (don't modify)
        key_file: "/certs/cert.key" # Container path (don't modify)

        # HOST paths for TLS certificates (used by startup scripts)
        # These are paths on YOUR machine, not inside the Docker container.
        # The docker server startup scripts read these and mount them into
        # the container.
        #
        # Tailscale profile defaults (REMOTE_TLS_PROFILE=tailscale or unset)
        # Windows: ~/Documents/Tailscale/my-machine.crt
        host_cert_path: "~/.config/Tailscale/my-machine.crt"
        host_key_path: "~/.config/Tailscale/my-machine.key"

        # LAN profile defaults (REMOTE_TLS_PROFILE=lan)
        # Use a locally trusted certificate (internal CA, self-managed cert, etc.)
        # Windows example: ~/Documents/TranscriptionSuite/lan-server.crt
        lan_host_cert_path: "~/.config/TranscriptionSuite/lan-server.crt"
        lan_host_key_path: "~/.config/TranscriptionSuite/lan-server.key"

# ----------------------------------------------------------------------------
# Logging Configuration
# ----------------------------------------------------------------------------
# Note: In Docker, the log directory is set via the LOG_DIR environment variable.
# If USER_CONFIG_DIR is mounted, logs go there; otherwise to /data/logs.
logging:
    # Logging level: "DEBUG", "INFO", "WARNING", "ERROR"
    level: "INFO"

    # Print log messages to console (useful for debugging).
    console_output: true

    # Log file name for the server.
    file_name: "server.log"

    # Directory for log files.
    # In Docker: Overridden by LOG_DIR env var (user config dir or /data/logs)
    # For local dev: Set to your preferred path
    directory: "/data/logs"

    # Maximum log file size in MB before rotation
    max_size_mb: 10

    # Number of backup log files to keep
    backup_count: 5

# ----------------------------------------------------------------------------
# Outgoing Webhook
# ----------------------------------------------------------------------------
# Fire HTTP POST requests to an external URL when transcription events occur.
# Events: live sentences (each completed sentence from Live Mode) and
# longform transcription completions (when a file transcription job finishes).
# The payload includes an "event" field ("live_sentence" or "longform_complete")
# and a "source" field ("live" or "longform") so the receiver can differentiate.
webhook:
    # Enable/disable outgoing webhooks.
    enabled: false

    # Target URL for webhook POST requests.
    # All events are sent to this single URL.
    url: ""

    # Optional bearer token or API key.
    # If set, sent as "Authorization: Bearer <secret>" header on outgoing requests.
    # You can use one of this server's auth tokens, or any external API key.
    secret: ""

# ============================================================================
# Real-time STT Engine Configuration
# ============================================================================
# Settings for the real-time speech-to-text engine used for live transcription.
# This controls voice activity detection, audio buffering, and transcription behavior.
stt:
    # --------------------------------------------------------------------------
    # Voice Activity Detection (VAD)
    # --------------------------------------------------------------------------
    # The STT engine uses a dual VAD approach: WebRTC for fast initial screening,
    # Silero for accurate confirmation. Voice is active only when BOTH agree.

    # WebRTC VAD sensitivity.
    # Range: 0 (most sensitive/aggressive) to 3 (least sensitive/aggressive).
    # Higher values = less likely to detect speech, more resistant to noise.
    # Default: 3
    webrtc_sensitivity: 3

    # Use Silero VAD for end-of-speech detection instead of WebRTC.
    # More robust against noise but uses more GPU resources.
    # Default: false
    silero_deactivity_detection: false

    # --------------------------------------------------------------------------
    # Recording Timing Parameters
    # --------------------------------------------------------------------------

    # Duration of silence (seconds) that must follow speech before recording stops.
    # Shorter = faster response, but may cut off speech. Longer = more complete but slower.
    # Default: 0.6
    post_speech_silence_duration: 0.6

    # Minimum recording length (seconds) before the recording can be stopped.
    # Prevents very short accidental recordings.
    # Default: 0.5
    min_length_of_recording: 0.5

    # Minimum time interval (seconds) between the end of one recording and start of next.
    # Prevents rapid successive recordings.
    # Default: 0.0
    min_gap_between_recordings: 0.0

    # Duration (seconds) of audio to keep in a pre-roll buffer.
    # Compensates for VAD detection latency by capturing audio before speech is detected.
    # Default: 1.0
    pre_recording_buffer_duration: 1.0

    # Maximum continuous silence duration (seconds) before trimming audio.
    # Long silence in recordings can cause Whisper hallucinations.
    # Default: 10.0
    max_silence_duration: 10.0

    # --------------------------------------------------------------------------
    # Early Transcription
    # --------------------------------------------------------------------------

    # Trigger speculative transcription after this period of silence (seconds).
    # Set to 0 to disable. Enabling can result in faster final transcriptions
    # but increases GPU load due to multiple transcription attempts.
    # Default: 0.0 (disabled)
    early_transcription_on_silence: 0.0

    # --------------------------------------------------------------------------
    # Audio Processing
    # --------------------------------------------------------------------------

    # Audio buffer size in samples per chunk.
    # The Silero VAD model expects minimum 512 samples.
    # Changing this may impact VAD performance.
    # Default: 512
    buffer_size: 512

    # Normalize audio to -0.95 dBFS before transcription.
    # Can improve transcription quality for quiet recordings.
    # Default: false
    normalize_audio: false

    # Normalize each incoming audio chunk BEFORE VAD evaluation.
    # Helps quiet monitor sources (e.g. headphone sinks) pass the VAD
    # threshold without manual capture-gain adjustment on the client.
    # Only amplifies — never attenuates.
    # Default: false
    pre_vad_normalize: false

    # --------------------------------------------------------------------------
    # Performance Tuning
    # --------------------------------------------------------------------------

    # Maximum audio queue size before discarding old chunks.
    # Prevents memory buildup if processing falls behind real-time.
    # Default: 100
    allowed_latency_limit: 100

    # Sleep duration (seconds) between processing loop iterations.
    # Lower = more responsive but higher CPU usage.
    # Default: 0.02
    time_sleep: 0.02

    # --------------------------------------------------------------------------
    # Output Formatting
    # --------------------------------------------------------------------------

    # Capitalize the first letter of transcribed sentences.
    # Default: true
    ensure_sentence_starting_uppercase: true

    # Add a period at the end of sentences that lack punctuation.
    # Default: true
    ensure_sentence_ends_with_period: true

    # --------------------------------------------------------------------------
    # Advanced: Token Suppression
    # --------------------------------------------------------------------------

    # List of Whisper token IDs to suppress from transcription output.
    # Token -1 means no suppression. See Whisper tokenizer for token IDs.
    # Default: [-1]
    suppress_tokens: [-1]

# ----------------------------------------------------------------------------
# Transcription Durability
# ----------------------------------------------------------------------------
# Controls how raw audio and transcription jobs are persisted to disk.
# Wave 2: raw audio preservation and retry support.
# Wave 3: startup orphan recovery (uses orphan_job_timeout_minutes).
durability:
    # Directory where raw audio recordings are saved before transcription.
    # Must be on a persistent volume (not /tmp). In Docker: /data/recordings.
    # Set to an empty string "" to disable persistent audio saving (falls back to /tmp).
    recordings_dir: "/data/recordings"

    # How many days to keep raw audio files for completed+delivered jobs.
    # Set to 0 to keep audio files forever (no automatic cleanup).
    # Audio for failed or undelivered jobs is never automatically deleted.
    # Default: 7
    audio_retention_days: 7

    # Whether to run periodic audio cleanup. Set to false to disable cleanup
    # entirely (audio files are kept forever regardless of audio_retention_days).
    # Default: true
    cleanup_enabled: true

    # How often (in hours) to re-run audio cleanup while the server is running.
    # Cleanup always runs once at startup. Set to 0 for startup-only (no repeats).
    # Default: 24
    cleanup_interval_hours: 24

    # Jobs stuck in 'processing' longer than this are considered orphaned on startup.
    # Used by Wave 3 startup recovery. Set in minutes.
    # Default: 10
    orphan_job_timeout_minutes: 10

    # How often (in minutes) to sweep for orphaned jobs while the server is running.
    # Startup already runs orphan recovery once. Set to 0 to disable periodic sweeps.
    # Default: 30
    orphan_sweep_interval_minutes: 30

# Issue #104, Sprint 4 — auto-summary and auto-export coordinator settings.
auto_actions:
    # How often (in seconds) the deferred-export sweeper re-checks rows whose
    # destination was missing at completion time. When the destination comes
    # back online, the row's auto_export_status flips from 'deferred' back to
    # 'success' on the next sweep. Also re-fires auto_summary 'retry_pending'
    # rows (Story 6.11). Set to 0 to disable the sweeper entirely.
    # Default: 30
    deferred_export_sweep_interval_s: 30.0

# Issue #104, Sprint 5 — per-profile webhook delivery (epic-webhook).
# This is the NEW per-profile webhook system (separate from the legacy
# `webhook:` block above which is global / fire-and-forget). Per-profile
# webhooks are durable: every attempt is persisted to webhook_deliveries
# (R-EL33 / NFR17) so retries survive crashes.
webhook_deliveries:
    # Enable/disable the WebhookWorker entirely. When false, profile saves
    # still validate the URL (so users can configure ahead of time), but no
    # delivery attempts are made.
    # Default: true
    enabled: true

    # How often (in seconds) the worker polls for new pending deliveries
    # when there is no producer wake-up signal. Producers (auto-action
    # coordinator + retry endpoint) call notify_new_delivery() to shortcut
    # this for fresh events; the poll is a recovery floor for orphaned
    # rows after a crash.
    # Default: 5.0
    poll_interval_s: 5.0

    # Enable/disable the periodic retention sweeper (NFR40). When false,
    # success / manual_intervention_required rows accumulate forever;
    # useful for forensic reviews of long-running deployments.
    # Default: true
    retention_enabled: true

    # Number of days to retain success / manual_intervention_required rows
    # before periodic cleanup deletes them. Pending / in_flight / failed
    # rows are NEVER cleaned (still actionable / queryable for debug).
    # Default: 30
    retention_days: 30

    # How often (in hours) the retention sweep runs. The first sweep runs
    # immediately at startup; subsequent sweeps follow the interval.
    # Default: 24
    retention_interval_hours: 24

