[project]
name = "transcriptionsuite-build"
version = "1.3.6"
description = "TranscriptionSuite build env for the standalone client"
requires-python = ">=3.13,<3.14"
license = "GPL-3.0-or-later"
authors = [
    { name = "homelab-00" }
]
keywords = ["transcription", "tray", "desktop", "client"]
classifiers = [
    "Programming Language :: Python :: 3.13",
    "Operating System :: POSIX :: Linux",
    "Operating System :: Microsoft :: Windows :: Windows 11",
    "Topic :: Build Environment",
]

[dependency-groups]
# Developer tooling used from ./build/.venv
tooling = [
    "ruff>=0.15.5",
    "pyright>=1.1.408",
    "pre-commit>=4.5.1",
]

# Security and license auditing tools
security = [
    "bandit>=1.9.4",
    "pip-licenses>=5.5.1",
]

# Minimal extras used by backend test runs from the build environment
backend-test = [
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=7.0.0",
    "httpx>=0.28.1",
    "pyyaml>=6.0.3",
    "numpy>=2.4.2",
    "fastapi>=0.135.1",
    "pydantic>=2.12.5",
    "scipy>=1.17.1",
    "structlog>=25.5.0",
    "ffmpeg-python>=0.2.0",
    "aiofiles>=25.1.0",
    "python-multipart>=0.0.27",
    "soundfile>=0.13.1",
    # Day-1 test fixtures (Story 1.1 — Audio Notebook QoL pack epic-foundations).
    # Mirror of server/backend/pyproject.toml [dependency-groups.dev]; keep in sync.
    "aiohttp>=3.14.0",       # webhook_mock_receiver fixture
    "keyring>=25.0,<26",     # NFR33 — fake_keyring fixture (Story 1.7 consumer)
    "keyrings.alt>=5.0",     # NFR34 — file-encrypted fallback for headless Linux
    "freezegun>=1.5",        # frozen_clock fixture; replaces datetime.now() in tests
    "pytest-benchmark>=5.0", # NFR1 — CRUD latency <15% regression budget
    # Story 1.2 / 1.3 / 1.9 — migration + repository tests apply real Alembic
    # upgrades against tmp_path SQLite. Mirror of server/backend/pyproject.toml
    # runtime deps; keep in sync.
    "alembic>=1.18.4",
    "sqlalchemy>=2.0.48",
]

[tool.uv]
default-groups = ["tooling", "backend-test", "security"]

[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "C4"]
ignore = ["E501"]

[tool.pyright]
pythonVersion = "3.13"
typeCheckingMode = "basic"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
