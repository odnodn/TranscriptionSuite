blur_depth_budgets:
  default_max: 3
  per_file_overrides:
    App.tsx:
      max: 8
      reason: Four mutually-exclusive confirmation dialogs (overlay + panel each); only one mounts at a time.
    components/views/AudioNoteModal.tsx:
      max: 7
      reason: Sibling visualizer overlays + modal chrome + GH
    components/views/BugReportModal.tsx:
      max: 4
      reason: Modal overlay + panel + nested input/preview surfaces.
    components/views/NotebookView.tsx:
      max: 4
      reason: View container + header + scroll-edge fade gradients; design-language §Surface Language.
    components/views/ServerView.tsx:
      max: 4
      reason: Multiple GlassCards co-resident on this primary view.
    components/views/SessionView.tsx:
      max: 4
      reason: Primary working surface — header + scroll-edge fades + GlassCards.
component_contracts:
  AboutModal:
    file: components/views/AboutModal.tsx
    required_tokens:
      - colors
      - motion
      - radii
      - shadows
      - blur
      - z_index
    allowed_variants:
      isOpen:
        - "true"
        - "false"
      isVisible:
        - "true"
        - "false"
    structural_invariants:
      - id: about-modal-layout
        rule: About modal keeps gradient banner, floating avatar, links grid, and footer section hierarchy.
    behavior_rules:
      - id: about-modal-transition
        rule: Backdrop and modal slide transitions remain bound to approved duration/ease tokens.
    state_rules:
      - id: profile-badge
        rule: Profile link indicator badge retains cyan accent and dark border treatment.
  ActivityCard:
    file: components/ui/ActivityNotifications.tsx
    required_tokens:
      - colors
      - motion
      - radii
      - shadows
    allowed_variants: {}
    structural_invariants:
      - id: structure-stable
        rule: Preserve current structural layout and region hierarchy for this component.
    behavior_rules:
      - id: motion-locked
        rule: Use only approved motion tokens and classes from foundation token registry.
    state_rules:
      - id: closed-set-styles
        rule: Do not introduce unregistered utility, arbitrary, or inline style values.
